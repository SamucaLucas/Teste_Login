<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Usuários Cadastrados</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #050A30 0%, #1B0044 50%, #2E0249 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
        }

        .glass-container {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            padding: 40px;
            width: 80%;
            max-width: 800px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
        }

        h2 {
            text-align: center;
            margin-top: 0;
        }

        /* Estilizando a Tabela com efeito de vidro */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th,
        td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        th {
            background: rgba(255, 255, 255, 0.1);
            font-weight: bold;
        }

        tr:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        /* Botões de Ação */
        .btn-acao {
            padding: 8px 15px;
            border: none;
            border-radius: 5px;
            color: white;
            text-decoration: none;
            font-size: 14px;
            transition: 0.3s;
        }

        .btn-editar {
            background: #00f2fe;
            color: #050A30;
            font-weight: bold;
        }

        .btn-editar:hover {
            background: #4facfe;
        }

        .header-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .btn-novo {
            padding: 10px 20px;
            border-radius: 8px;
            text-decoration: none;
            background: rgba(255, 255, 255, 0.3);
            color: white;
            font-weight: bold;
        }

        .btn-novo:hover {
            background: rgba(255, 255, 255, 0.5);
        }

        .btn-deletar {
            background: rgba(255, 77, 77, 0.8);
            color: white;
            font-weight: bold;
            margin-left: 5px;
        }

        .btn-deletar:hover {
            background: rgba(255, 77, 77, 1);
        }
    </style>
</head>

<body>



    <div class="glass-container">
        <div class="header-actions">
            <h2>Usuários Cadastrados</h2>
            <a href="/logout" class="btn-novo" style="background: rgba(255, 0, 0, 0.3);">Sair</a>
        </div>

        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nome</th>
                    <th>E-mail</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody>
                {{range .}}
                <tr>
                    <td>{{.Id}}</td>
                    <td>{{.Nome}}</td>
                    <td>{{.Email}}</td>
                    <td>
                        <a href="/editar?id={{.Id}}" class="btn-acao btn-editar">Editar</a>
                        <a href="/deletar?id={{.Id}}" class="btn-acao btn-deletar"
                            onclick="return confirm('Tem certeza que deseja excluir o usuário {{.Nome}}?');">Excluir</a>
                    </td>
                </tr>
                {{end}}
            </tbody>
        </table>
    </div>

</body>

</html>
